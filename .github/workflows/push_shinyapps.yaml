name: Deploy Golem App to shinyapps.io

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    env:
      GITHUB_PAT: ${{ secrets.GITHUB_TOKEN }}
      R_KEEP_PKG_SOURCE: yes
    
    steps:
    - uses: actions/checkout@v4
    
    - uses: r-lib/actions/setup-r@v2
      with:
        r-version: '4.3.3'
        use-public-rspm: false
        
    - name: Setup pandoc
      uses: r-lib/actions/setup-pandoc@v2
      
    - uses: r-lib/actions/setup-r-dependencies@v2
      with:
        extra-packages: |
          any::rsconnect
          any::cpp11
          any::progress
          any::RcppArmadillo
          any::RcppEigen
        needs: |
          rsconnect
      
    - name: Fix CRAN source URLs for shinyapps.io
      # pak records RemoteReposName: CRAN (a name, not a URL) in installed package
      # DESCRIPTIONs. renv uses that name as the Repository value in the lockfile,
      # producing CRAN/src/contrib/... which shinyapps.io cannot resolve.
      # Patching it to the full CRAN URL fixes the manifest before deployment.
      run: |
        cran_url <- "https://cran.r-project.org"
        lib <- .libPaths()[1L]
        for (pkg in list.files(lib)) {
          desc <- file.path(lib, pkg, "DESCRIPTION")
          if (!file.exists(desc)) next
          txt <- readLines(desc, warn = FALSE)
          new_txt <- sub("^(RemoteReposName: )CRAN$", paste0("\\1", cran_url), txt)
          new_txt <- sub("^(Repository: )CRAN$",      paste0("\\1", cran_url), new_txt)
          if (!identical(txt, new_txt)) writeLines(new_txt, desc)
        }
      shell: Rscript {0}

    - name: Deploy to shinyapps.io
      run: |
        options(
          repos = c(CRAN = "https://cran.r-project.org"),
          renv.config.repos.override = c(CRAN = "https://cran.r-project.org"),
          renv.config.ppm.enabled = FALSE
        )
        rsconnect::setAccountInfo(
          name = "${{ secrets.SHINYAPPS_NAME }}",
          token = "${{ secrets.SHINYAPPS_TOKEN }}",
          secret = "${{ secrets.SHINYAPPS_SECRET }}"
        )
        
        rsconnect::deployApp(
          appDir = ".",
          appFiles = c(
            "R/",
            "inst/",
            "DESCRIPTION",
            "NAMESPACE", 
            "app.R"
          ),
          appName = "viewpoly",
          forceUpdate = TRUE,
          lint = FALSE
        )
      shell: Rscript {0}